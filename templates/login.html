<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>IronLog — Connexion</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:#080810;color:#f0f0f8;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;}
.box{width:100%;max-width:340px;text-align:center;}
.box div.emoji{font-size:48px;margin-bottom:16px;}
h1{font-size:26px;font-weight:900;margin-bottom:24px;}
input{width:100%;background:#111;border:1px solid #1e1e2e;border-radius:12px;padding:16px;color:#f0f0f8;font-size:16px;margin-bottom:12px;font-family:inherit;text-align:center;}
input:focus{outline:none;border-color:#f97316;}
button{width:100%;padding:16px;background:#f97316;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
.err{color:#ef4444;font-size:13px;margin-bottom:12px;}
</style>
</head>
<body>
<div class="box">
  <div class="emoji">🏋️</div>
  <h1>IronLog</h1>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Mot de passe" autofocus>
    <button type="submit">Connexion</button>
  </form>
</div>
</body>
</html>
