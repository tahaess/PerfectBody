<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PerfectBody">
<meta name="theme-color" content="#0a0000">
<link rel="apple-touch-icon" href="/static/icon.png">
<link rel="manifest" href="/static/manifest.json">
<title>PerfectBody{% block title %}{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --acc:#e31b1b;--bg:#0a0000;--bg2:#140000;--bg3:#1f0000;
  --border:#2a0000;--t1:#f5f0f0;--t2:#999;--t3:#555;
  --green:#22c55e;--red:#e31b1b;--purple:#a855f7;--blue:#cc1111;
  --sb:env(safe-area-inset-bottom,16px);--st:env(safe-area-inset-top,20px);
}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:'DM Sans',-apple-system,sans-serif;}
body{padding-bottom:calc(64px + var(--sb));}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.scroll{flex:1;padding:0 16px 20px;}
.pt{padding-top:calc(var(--st) + 28px);}

nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#0d0000;border-top:1px solid #111;padding-bottom:var(--sb);max-width:480px;margin:0 auto;z-index:50;}
nav a{flex:1;padding:10px 0 6px;text-align:center;text-decoration:none;color:var(--t3);}
nav a.on{color:var(--acc);text-shadow:0 0 8px rgba(227,27,27,0.7);}
nav .ni{font-size:19px;}
nav .nl{font-size:9px;letter-spacing:.5px;margin-top:3px;font-weight:700;display:block;}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.csm{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;}
.sec{font-size:10px;color:var(--t3);letter-spacing:3px;margin-bottom:12px;font-weight:700;}
h1{font-size:26px;font-weight:900;margin-bottom:4px;}
.sub{font-size:12px;color:var(--t3);margin-bottom:18px;}

.btn{display:block;width:100%;padding:15px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.5px;margin-bottom:8px;text-align:center;text-decoration:none;}
.btn.acc{background:linear-gradient(135deg,#e31b1b,#8b0000);color:#fff;box-shadow:0 4px 15px rgba(227,27,27,0.4);}
.btn.blue{background:linear-gradient(135deg,#cc1111,#700000);color:#fff;box-shadow:0 4px 15px rgba(200,0,0,0.3);}
.btn.purple{background:var(--purple);color:#fff;}
.btn.ghost{background:var(--bg2);border:1px solid var(--border);color:var(--t2);}
.btn.danger{background:#1a0a0a;border:1px solid #3a1a1a;color:var(--red);}

.back{display:inline-flex;align-items:center;justify-content:center;background:#151520;border:1px solid var(--border);color:var(--t2);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:18px;text-decoration:none;flex-shrink:0;}
.inp{width:100%;background:#111;border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--t1);font-family:inherit;font-size:14px;margin-bottom:10px;}
.inp:focus{outline:none;border-color:var(--acc);}
.lbl{font-size:10px;color:var(--t3);letter-spacing:2px;display:block;margin-bottom:6px;font-weight:700;}

.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mbtn{padding:20px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;text-decoration:none;color:var(--t1);display:block;}
.lbtn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--t1);margin-bottom:8px;}
.pr-badge{color:var(--acc);font-size:12px;font-weight:800;flex-shrink:0;margin-left:8px;}

.lhdr{padding:14px 16px 12px;border-bottom:1px solid #111;background:#0f0000;padding-top:calc(var(--st) + 28px);}
.hdr-row{display:flex;gap:12px;align-items:center;}

.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.sv{font-size:22px;font-weight:900;color:var(--acc);}
.sl{font-size:10px;color:var(--t3);margin-top:4px;letter-spacing:1px;font-weight:700;}

.sesbtn{display:block;width:100%;padding:14px 16px;background:var(--bg2);border:2px solid var(--border);border-radius:12px;text-decoration:none;color:var(--t1);margin-bottom:8px;}

.pinwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;}
.pdots{display:flex;gap:16px;margin:16px 0;}
.pdot{width:16px;height:16px;border-radius:50%;background:var(--border);}
.pdot.fill{background:var(--purple);}
.ppad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;max-width:280px;}
.pkey{padding:18px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;color:var(--t1);}

.injcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.injcard.done{border-color:var(--purple);background:#12091e;}
.injcard.today{border-color:var(--acc);}

.set-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:var(--bg2);border:1px solid var(--border);}
.set-row.saved{border-color:#1a3a1a;}

.pzone{background:#0e0e1a;border-radius:16px;padding:14px;}
.numinp{width:100%;background:transparent;border:none;color:var(--t1);font-family:'DM Mono',monospace;font-size:48px;font-weight:800;text-align:center;-webkit-appearance:none;}
.numinp:focus{outline:none;}
.numlbl{font-size:10px;color:var(--t3);letter-spacing:3px;text-align:center;margin-bottom:6px;font-weight:700;}
.numrow{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;}
.stepbtn{width:44px;height:44px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--t1);font-size:20px;font-weight:700;cursor:pointer;}
.stepbtn.plus{color:var(--green);}
.stepbtn.minus{color:var(--acc);}

.sbtn{display:block;width:100%;padding:18px;border-radius:14px;font-family:inherit;font-size:17px;font-weight:900;cursor:pointer;letter-spacing:1px;border:none;text-align:center;text-decoration:none;}
.sbtn.rdy{background:linear-gradient(135deg,#e31b1b,#8b0000);color:#fff;box-shadow:0 4px 20px rgba(227,27,27,0.5);letter-spacing:1px;}
</style>
</head>
<body>
<div id="app">
{% block content %}{% endblock %}
<nav>
  <a href="{{ url_for('seances') }}" class="{{ 'on' if request.endpoint=='seances' }}"><div class="ni">📋</div><div class="nl">SÉANCES</div></a>
  <a href="{{ url_for('stats') }}" class="{{ 'on' if request.endpoint=='stats' }}"><div class="ni">📊</div><div class="nl">STATS</div></a>
  <a href="{{ url_for('cycle_home') }}" class="{{ 'on' if request.endpoint and request.endpoint.startswith('cycle') }}"><div class="ni">🔄</div><div class="nl">CYCLE</div></a>
  <a href="{{ url_for('enhancement_home') }}" class="{{ 'on' if request.endpoint and request.endpoint.startswith('enh') }}"><div class="ni">🧬</div><div class="nl">ENHANCE</div></a>
  <a href="{{ url_for('settings') }}" class="{{ 'on' if request.endpoint=='settings' }}"><div class="ni">⚙️</div><div class="nl">RÉGLAGES</div></a>
</nav>
</div>
</body>
</html>
